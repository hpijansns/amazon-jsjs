<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header-main">
        <div class="header-top">
            <img src="https://static-assets-web.flixcart.com/fk-p-linchpin-web/fk-cp-zion/img/flipkart-plus_8d85f4.png" height="18">
            <span style="color:white; font-size:18px;">🛒</span>
        </div>
        <div class="search-bar">🔍 <input type="text" placeholder="Search for Products..."></div>
    </div>

    <div style="background:white;"><img id="catImgDisplay" src="" style="width:100%;"></div>
    <div style="background:white;"><img id="sliderImg" src="" style="width:100%;"></div>

    <div style="background:#607d8b; color:white; padding:12px; display:flex; justify-content:space-between;">
        <span>Deals of the Day</span>
        <span id="countdown">10:00</span>
    </div>

    <div class="product-grid" id="productGrid"></div>

    <script type="module" src="app.js"></script>
    <script>
        let time = 600;
        setInterval(() => {
            let m = Math.floor(time/60), s = time%60;
            if(document.getElementById('countdown')) 
                document.getElementById('countdown').innerText = `${m}:${s<10?'0'+s:s}`;
            if(time > 0) time--;
        }, 1000);
    </script>
</body>
</html>
