<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipkart Lite - Sale is Live</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="header">
        <div class="top-row">
            <span class="menu-icon">☰</span>
            <img src="https://static-assets-web.flixcart.com/fk-p-linchpin-web/fk-cp-zion/img/flipkart-plus_8d85f4.png" class="logo">
        </div>
        <div class="search-container">
            <input type="text" placeholder="Search for Products, Brands and More">
        </div>
    </div>

    <div class="categories-section">
        <img src="https://rukminim1.flixcart.com/fk-p-flap/128/128/image/0d75b34f7d8f13a7.png" style="width:100%" alt="Categories Dummy">
    </div>

    <div class="slider">
        <img src="https://rukminim1.flixcart.com/fk-p-flap/1600/270/image/ed12030b4f8c985e.jpg" id="sliderImg">
    </div>

    <div class="deal-header">
        <div class="deal-left">
            <span class="deal-title">Deals of the Day</span>
            <span class="timer">⏰ <span id="countdown">10:00</span></span>
        </div>
        <div class="sale-live">SALE IS LIVE</div>
    </div>

    <div class="product-grid" id="productGrid">
        </div>

    <script type="module" src="app.js"></script>
</body>
</html>
