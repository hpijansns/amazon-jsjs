<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipkart Online Shopping</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <div class="header-top">
            <img src="https://static-assets-web.flixcart.com/fk-p-linchpin-web/fk-cp-zion/img/flipkart-plus_8d85f4.png" class="logo">
            <div style="font-size: 20px;">🛒</div>
        </div>
        <div class="search-box"><input type="text" placeholder="Search for Products, Brands and More"></div>
    </div>

    <div class="category-container"><img id="catImgDisplay" src=""></div>
    
    <div class="slider-container"><img id="sliderImg" src=""></div>

    <div class="deals-header">
        <div class="deals-left">
            <span class="deals-title">Deals of the Day</span>
            <span class="timer-box">⏰ <span id="countdown">10:00</span></span>
        </div>
        <div class="sale-live">SALE IS LIVE</div>
    </div>

    <div class="product-grid" id="productGrid"></div>

    <script type="module" src="app.js"></script>
</body>
</html>
