<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipkart - Online Shopping</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="header-main">
        <div class="header-top">
            <div style="display:flex; align-items:center; gap:10px;">
                <span style="color:white; font-size:20px; cursor:pointer;">☰</span>
                <img src="https://static-assets-web.flixcart.com/fk-p-linchpin-web/fk-cp-zion/img/flipkart-plus_8d85f4.png" height="18" alt="Flipkart Logo">
            </div>
            <div style="position:relative; cursor:pointer;">
                <span style="color:white; font-size:20px;">🛒</span>
                <span style="position:absolute; top:-8px; right:-8px; background:#ff6161; color:white; font-size:10px; padding:2px 5px; border-radius:50%;">1</span>
            </div>
        </div>
        <div class="search-bar">
            🔍 <input type="text" placeholder="Search for Products, Brands and More" readonly>
        </div>
    </div>

    <div style="background:white; border-bottom: 1px solid #ddd;">
        <img id="catImgDisplay" src="" style="width:100%; display:block;" alt="Categories">
    </div>

    <div style="background:white; margin-top: 5px;">
        <img id="sliderImg" src="" style="width:100%; display:block;" alt="Main Banner">
    </div>

    <div style="background:#607d8b; color:white; padding:12px; display:flex; justify-content:space-between; align-items:center; margin-top:5px;">
        <div style="display:flex; align-items:center; gap:8px;">
            <span style="font-weight:bold;">Deals of the Day</span>
            <span style="font-size:13px; opacity:0.9;">🕒 <span id="countdown">10:00</span></span>
        </div>
        <button style="background:white; color:#2874f0; border:none; padding:5px 12px; font-size:12px; font-weight:bold; border-radius:2px;">VIEW ALL</button>
    </div>

    <div class="product-grid" id="productGrid">
        </div>

    <script type="module" src="app.js"></script>

    <script>
        // Default timer 10:00 (600 seconds)
        let time = 600; 
        const countdownElement = document.getElementById('countdown');

        const updateTimer = () => {
            let minutes = Math.floor(time / 60);
            let seconds = time % 60;
            
            // Formatting to 00:00
            seconds = seconds < 10 ? '0' + seconds : seconds;
            minutes = minutes < 10 ? '0' + minutes : minutes;

            if(countdownElement) {
                countdownElement.innerText = `${minutes}:${seconds}`;
            }

            if(time > 0) {
                time--;
            } else {
                time = 600; // Reset timer when it reaches 0
            }
        };

        setInterval(updateTimer, 1000);
    </script>

</body>
</html>
