<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel - Control Center</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-box { background: white; margin: 10px; padding: 15px; border-radius: 8px; box-shadow: 0 0 10px #ccc; }
        input { width: 90%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; }
        .btn { background: #fb641b; color: white; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; width: 100%; }
        table { width: 100%; margin-top: 10px; border-collapse: collapse; }
        th, td { border: 1px solid #eee; padding: 8px; font-size: 12px; }
    </style>
</head>
<body style="background:#f1f3f6;">

    <div class="admin-box">
        <h3>1. Manage Products</h3>
        <input type="text" id="pName" placeholder="Product Name">
        <input type="text" id="pImage" placeholder="Image URL">
        <input type="number" id="pMRP" placeholder="MRP (e.g. 6499)">
        <input type="number" id="pPrice" placeholder="Selling Price (e.g. 99)">
        <input type="text" id="pDelivery" placeholder="Delivery (Free Delivery in Two Days)">
        <button class="btn" onclick="saveProduct()">Save Product</button>
        <table id="pTable"><thead><tr><th>Img</th><th>Name</th><th>Action</th></tr></thead><tbody id="pBody"></tbody></table>
    </div>

    <div class="admin-box">
        <h3>2. Manage Sliders (Multiple)</h3>
        <input type="text" id="sUrl" placeholder="Slider Image URL">
        <button class="btn" style="background:#2874f0;" onclick="addSlider()">Add Banner</button>
        <div id="sList" style="display:flex; gap:5px; margin-top:10px; overflow-x:auto;"></div>
    </div>

    <div class="admin-box">
        <h3>3. Manage Category Strip</h3>
        <input type="text" id="cUrl" placeholder="Category Strip URL">
        <button class="btn" style="background:#388e3c;" onclick="updateCat()">Update Strip</button>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
