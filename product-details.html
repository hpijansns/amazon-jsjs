<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Slider dots styling (Optional but good for UX) */
        .slider { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; background: white; -webkit-overflow-scrolling: touch; }
        .slider::-webkit-scrollbar { display: none; } /* Hide scrollbar */
        .slider img { width: 100%; flex-shrink: 0; height: 320px; object-fit: contain; scroll-snap-align: start; }
        
        .white-section { background: white; padding: 15px; margin-bottom: 8px; }
        .long-desc img { width: 100%; display: block; height: auto; }
        
        /* Fixed Header Style to match Index */
        .header-main { background: #2874f0; color:white; display:flex; gap:15px; align-items:center; padding: 12px; position: sticky; top: 0; z-index: 100; }
        .back-btn { font-size: 24px; cursor: pointer; line-height: 1; }
    </style>
</head>
<body style="padding-bottom: 60px; background: #f1f3f6; margin: 0;">

    <div class="header-main">
        <span class="back-btn" onclick="history.back()">&larr;</span> 
        <span style="font-weight: 500;">Product Details</span>
    </div>

    <div class="slider" id="mainSlider"></div>

    <div class="white-section">
        <div id="title" style="font-size:15px; margin-bottom:10px; color: #212121; line-height: 1.4;"></div>
        <div style="display: flex; align-items: center; gap: 8px;">
            <span id="off" style="color:#388e3c; font-weight:bold; font-size:18px;"></span>
            <span id="mrp" style="text-decoration:line-through; color:#878787; font-size: 14px;"></span>
        </div>
        <div id="price" style="font-size:24px; font-weight:bold; margin-top: 4px;"></div>
        
        <div style="border:1px solid #ddd; padding:12px; display:flex; align-items:center; gap:12px; border-radius:4px; margin-top:10px;">
            <img src="https://static-assets-web.flixcart.com/fk-p-linchpin-web/fk-cp-zion/img/fa_62965a.png" width="60">
            <div style="font-size:11px; color: #212121;">
                <strong>1 Year Brand Warranty</strong><br>
                7 Days Replacement Policy
            </div>
        </div>
    </div>

    <div class="white-section">
        <h4 style="margin:0 0 10px 0; font-size: 14px; border-bottom: 1px solid #f0f0f0; padding-bottom: 8px;">Product Description</h4>
        <p id="desc" style="font-size:13px; color:#555; line-height:1.6;"></p>
    </div>

    <div id="descImages" class="long-desc"></div>

    <div class="footer-btns" style="position: fixed; bottom: 0; width: 100%; display: flex; height: 50px; z-index: 100;">
        <button class="cart-btn" style="flex: 1; background: #fff; border: 1px solid #eee; font-weight: bold;">ADD TO CART</button>
        <button id="buyBtn" class="buy-btn" style="flex: 1; background: #ff9f00; border: none; color: white; font-weight: bold;">BUY NOW</button>
    </div>

    <script>
        const p = new URLSearchParams(window.location.search);
        
        // Data Rendering
        document.getElementById('title').innerText = p.get('name');
        document.getElementById('price').innerText = "₹" + p.get('price');
        document.getElementById('mrp').innerText = "₹" + p.get('mrp');
        document.getElementById('off').innerText = p.get('off') + "% Off";
        document.getElementById('desc').innerText = p.get('desc');

        // Slider Images Fix
        const imgParam = p.get('img');
        if(imgParam) {
            imgParam.split(',').map(i => i.trim()).filter(Boolean).forEach(url => {
                const imgTag = document.createElement('img');
                imgTag.src = url;
                document.getElementById('mainSlider').appendChild(imgTag);
            });
        }

        // Long Description Images Render
        const descImgParam = p.get('descImgs');
        if(descImgParam) {
            descImgParam.split(',').map(i => i.trim()).filter(Boolean).forEach(url => {
                const descImgTag = document.createElement('img');
                descImgTag.src = url;
                document.getElementById('descImages').appendChild(descImgTag);
            });
        }

        // Button Action - Sending to delivery-address.html
        document.getElementById('buyBtn').onclick = () => {
            window.location.href = `delivery-address.html?${window.location.search.toString()}`;
        };
    </script>
</body>
</html>
