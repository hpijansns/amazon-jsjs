<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #f1f3f6; padding-bottom: 70px; }
        .white-box { background: white; padding: 15px; margin-bottom: 8px; }
        .img-slider { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; background: white; }
        .img-slider img { width: 100%; flex-shrink: 0; height: 350px; object-fit: contain; scroll-snap-align: start; }
        
        /* Warranty Card Style */
        .warranty-card { border: 1px solid #e0e0e0; padding: 12px; display: flex; align-items: center; gap: 15px; border-radius: 4px; margin-top: 15px; }
        .flipkart-plus-logo { width: 70px; }

        /* Long Description Images */
        .description-images-list img { width: 100%; display: block; margin-top: 2px; }
    </style>
</head>
<body>
    <div class="header-main" style="display:flex; align-items:center; gap:15px; color:white; background:#2874f0; padding:10px;">
        <span onclick="history.back()" style="cursor:pointer; font-size:20px;">&larr;</span>
        <div style="flex:1">Product Details</div>
        <span>🛒</span>
    </div>

    <div class="img-slider" id="productImageSlider"></div>

    <div class="white-box">
        <h1 id="productTitle" style="font-size:16px; font-weight:normal; margin:0 0 10px 0;"></h1>
        <div style="margin-bottom:5px;">
            <span id="discountLabel" style="color:#388e3c; font-weight:bold; font-size:18px;"></span>
            <span id="mrpLabel" style="text-decoration:line-through; color:#878787; margin-left:8px;"></span>
        </div>
        <div id="sellingPriceLabel" style="font-size:24px; font-weight:bold;"></div>

        <div class="warranty-card">
            <img src="https://static-assets-web.flixcart.com/fk-p-linchpin-web/fk-cp-zion/img/flipkart-plus_8d85f4.png" class="flipkart-plus-logo">
            <div style="font-size:12px; color:#212121;">
                <strong>1 Year Brand Warranty</strong><br>
                7 Days Replacement Policy | <span style="color:#2874f0;">Know More</span>
            </div>
        </div>
    </div>

    <div class="white-box">
        <h3 style="font-size:14px; margin-top:0;">Product Description</h3>
        <p id="productDescriptionText" style="font-size:13px; color:#666; line-height:1.6;"></p>
    </div>

    <div class="description-images-list" id="descriptionImagesList"></div>

    <div class="footer-btns">
        <button class="cart-btn">ADD TO CART</button>
        <button id="buyNowButton" class="buy-btn">BUY NOW</button>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        
        document.getElementById('productTitle').innerText = params.get('name');
        document.getElementById('sellingPriceLabel').innerText = "₹" + params.get('price');
        document.getElementById('mrpLabel').innerText = "₹" + params.get('mrp');
        document.getElementById('discountLabel').innerText = params.get('off') + "% Off";
        document.getElementById('productDescriptionText').innerText = params.get('desc');

        // Handling Multiple Main Images
        const mainImgs = params.get('img').split(',').map(s => s.trim()).filter(Boolean);
        mainImgs.forEach(url => {
            document.getElementById('productImageSlider').innerHTML += `<img src="${url}">`;
        });

        // Handling Long Description Images
        const descImgs = params.get('descImgs') ? params.get('descImgs').split(',').map(s => s.trim()).filter(Boolean) : [];
        descImgs.forEach(url => {
            document.getElementById('descriptionImagesList').innerHTML += `<img src="${url}">`;
        });

        document.getElementById('buyNowButton').onclick = () => {
            window.location.href = `checkout.html?${window.location.search.toString()}`;
        };
    </script>
</body>
</html>
