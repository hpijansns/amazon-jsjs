<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <style>
        .slider { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; background: white; }
        .slider img { width: 100%; flex-shrink: 0; height: 320px; object-fit: contain; scroll-snap-align: start; }
        .white-section { background: white; padding: 15px; margin-bottom: 8px; }
        .long-desc img { width: 100%; display: block; }
    </style>
</head>
<body style="padding-bottom: 60px;">
    <div class="header-main" style="color:white; display:flex; gap:15px; align-items:center;">
        <span onclick="history.back()">&larr;</span> <span>Product Details</span>
    </div>

    <div class="slider" id="mainSlider"></div>

    <div class="white-section">
        <div id="title" style="font-size:15px; margin-bottom:10px;"></div>
        <div>
            <span id="off" style="color:#388e3c; font-weight:bold; font-size:18px;"></span>
            <span id="mrp" style="text-decoration:line-through; color:#878787; margin-left:8px;"></span>
        </div>
        <div id="price" style="font-size:24px; font-weight:bold;"></div>
        
        <div style="border:1px solid #ddd; padding:12px; display:flex; align-items:center; gap:10px; border-radius:4px; margin-top:10px;">
            <img src="https://static-assets-web.flixcart.com/fk-p-linchpin-web/fk-cp-zion/img/flipkart-plus_8d85f4.png" width="70">
            <div style="font-size:11px;">1 Year Brand Warranty <br><span style="color:#2874f0;">Know More</span></div>
        </div>
    </div>

    <div class="white-section">
        <h4 style="margin:0 0 10px 0;">Description</h4>
        <p id="desc" style="font-size:13px; color:#555; line-height:1.5;"></p>
    </div>

    <div id="descImages" class="long-desc"></div>

    <div class="footer-btns">
        <button class="cart-btn">ADD TO CART</button>
        <button id="buyBtn" class="buy-btn">BUY NOW</button>
    </div>

    <script>
        const p = new URLSearchParams(window.location.search);
        document.getElementById('title').innerText = p.get('name');
        document.getElementById('price').innerText = "₹" + p.get('price');
        document.getElementById('mrp').innerText = "₹" + p.get('mrp');
        document.getElementById('off').innerText = p.get('off') + "% Off";
        document.getElementById('desc').innerText = p.get('desc');

        // Slider Images
        p.get('img').split(',').map(i => i.trim()).filter(Boolean).forEach(url => {
            document.getElementById('mainSlider').innerHTML += `<img src="${url}">`;
        });

        // Long Description Images
        if(p.get('descImgs')) {
            p.get('descImgs').split(',').map(i => i.trim()).filter(Boolean).forEach(url => {
                document.getElementById('descImages').innerHTML += `<img src="${url}">`;
            });
        }

        document.getElementById('buyBtn').onclick = () => {
            window.location.href = `checkout.html?${window.location.search.toString()}`;
        };
    </script>
</body>
</html>
