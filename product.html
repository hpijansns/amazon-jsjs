<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #f1f3f6; padding-bottom: 70px; }
        .white-box { background: white; padding: 15px; margin-bottom: 8px; }
        .slider-wrapper { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; background: white; -webkit-overflow-scrolling: touch; }
        .slider-wrapper img { width: 100%; flex-shrink: 0; height: 320px; object-fit: contain; scroll-snap-align: start; }
        .p-name-dtl { font-size: 15px; color: #212121; margin-bottom: 8px; line-height: 1.4; }
        .warranty-card { display: flex; align-items: center; gap: 12px; border: 1px solid #e0e0e0; padding: 10px; border-radius: 4px; margin: 10px 0; }
        .desc-long-imgs img { width: 100%; display: block; }
    </style>
</head>
<body>
    <div class="header" style="display:flex; align-items:center; gap:12px;">
        <span onclick="history.back()" style="font-size:22px;">&larr;</span>
        <div class="search-box" style="flex:1;"><input type="text" placeholder="Search in store..."></div>
        <span>🛒</span>
    </div>

    <div class="slider-wrapper" id="imgScroll"></div>

    <div class="white-box">
        <div class="p-name-dtl" id="dN"></div>
        <div style="font-size: 22px; font-weight: bold;">₹<span id="dP"></span> 
            <span id="dO" style="color:#388e3c; font-size:14px; margin-left:8px;"></span>
        </div>
        <div id="dM" style="text-decoration:line-through; color:#878787; font-size:14px;"></div>
        
        <div class="warranty-card">
            <img src="https://static-assets-web.flixcart.com/fk-p-linchpin-web/fk-cp-zion/img/fa_62965a.png" width="60">
            <div style="font-size:12px; color:#212121;">1 Year Warranty & 7 Days Replacement<br><span style="color:#2874f0;">View Details</span></div>
        </div>
    </div>

    <div class="white-box">
        <h4 style="margin:0 0 8px 0; font-size:14px;">Product Description</h4>
        <p id="dD" style="font-size:13px; color:#444; margin:0;"></p>
    </div>

    <div class="desc-long-imgs" id="longImgs"></div>

    <div class="footer-btns">
        <button class="cart-btn">ADD TO CART</button>
        <button id="bnBtn" class="buy-btn">BUY NOW</button>
    </div>

    <script>
        const u = new URLSearchParams(window.location.search);
        document.getElementById('dN').innerText = u.get('name');
        document.getElementById('dP').innerText = u.get('price');
        document.getElementById('dM').innerText = "₹" + u.get('mrp');
        document.getElementById('dO').innerText = u.get('off') + "% Off";
        document.getElementById('dD').innerText = u.get('desc') || "Genuine Product with Brand Warranty.";

        // Slider Images
        const imgs = u.get('img').split(',');
        imgs.forEach(i => { document.getElementById('imgScroll').innerHTML += `<img src="${i.trim()}">`; });

        // Description Images
        const dImgs = u.get('descImgs') ? u.get('descImgs').split(',') : [];
        dImgs.forEach(i => { document.getElementById('longImgs').innerHTML += `<img src="${i.trim()}">`; });

        document.getElementById('bnBtn').onclick = () => {
            window.location.href = `checkout.html?${window.location.search.toString()}`;
        };
    </script>
</body>
</html>
