<script type="module">
    // Firebase Import
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBfA-mFODccLz13nLpFQFI5Q2qBNIS2_KI",
        authDomain: "flipkart-clone-ab903.firebaseapp.com",
        databaseURL: "https://flipkart-clone-ab903-default-rtdb.firebaseio.com",
        projectId: "flipkart-clone-ab903",
        storageBucket: "flipkart-clone-ab903.firebasestorage.app",
        messagingSenderId: "733319152647",
        appId: "1:733319152647:web:cb5943fc21d8676bad16a2"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let upiLink = ""; // Isme link save hoga

    // Admin Panel se UPI Link fetch karna
    onValue(ref(db, 'paymentSettings/upiLink'), (snapshot) => {
        upiLink = snapshot.val();
    });

    // Price fetch from URL
    const urlParams = new URLSearchParams(window.location.search);
    const price = urlParams.get('price') || "99";
    document.getElementById('finalAmt').innerText = "₹" + price;
    document.getElementById('bottomAmt').innerText = "₹" + price;

    window.processPayment = function() {
        const upiSelected = document.getElementById('upi').checked;

        if (upiSelected && upiLink) {
            const btn = document.querySelector('.pay-btn');
            btn.innerText = "Redirecting...";
            
            // Redirect to Admin's UPI Link
            setTimeout(() => {
                window.location.href = upiLink;
            }, 1000);
        } else if (upiSelected && !upiLink) {
            alert("Payment link not set by Admin!");
        } else {
            alert("Please select UPI to proceed.");
        }
    }
</script>
