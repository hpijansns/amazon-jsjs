<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add delivery address</title>
    <style>
        body { font-family: -apple-system, sans-serif; margin: 0; background: #fff; color: #212121; }
        
        /* Header */
        .header { display: flex; align-items: center; padding: 12px; border-bottom: 1px solid #e0e0e0; position: sticky; top: 0; background: white; z-index: 10; }
        .back-btn { font-size: 24px; margin-right: 15px; cursor: pointer; }
        .header-title { font-size: 16px; font-weight: 500; }

        /* Step Indicator */
        .steps-bar { display: flex; justify-content: space-around; padding: 20px 10px; position: relative; }
        .step { text-align: center; flex: 1; position: relative; z-index: 2; }
        .step-circle { width: 22px; height: 22px; border-radius: 50%; border: 1px solid #2874f0; display: flex; align-items: center; justify-content: center; margin: 0 auto 5px; background: white; color: #2874f0; font-size: 12px; font-weight: bold; }
        .step.active .step-circle { background: #2874f0; color: white; }
        .step-label { font-size: 11px; color: #878787; }
        .step.active .step-label { color: #212121; font-weight: 500; }
        /* Line between steps */
        .steps-bar::after { content: ''; position: absolute; top: 31px; left: 15%; right: 15%; height: 1px; background: #e0e0e0; z-index: 1; }

        /* Form Styling */
        .form-container { padding: 0 15px 100px; }
        .input-box { width: 100%; border: 1px solid #c2c2c2; border-radius: 4px; padding: 15px; margin-top: 20px; box-sizing: border-box; font-size: 15px; outline: none; }
        .input-box:focus { border-color: #2874f0; }
        
        .row { display: flex; gap: 10px; }
        
        /* State Dropdown specific */
        .state-wrapper { position: relative; margin-top: 20px; width: 100%; }
        .state-label { position: absolute; top: -10px; left: 10px; background: white; padding: 0 5px; font-size: 12px; color: #2874f0; }
        .state-select { width: 100%; border: 1px solid #2874f0; border-radius: 4px; padding: 15px; font-size: 15px; background: white; outline: none; -webkit-appearance: none; }

        /* Bottom Button */
        .footer { position: fixed; bottom: 0; width: 100%; padding: 10px; background: white; border-top: 1px solid #e0e0e0; box-sizing: border-box; }
        .save-btn { background: #fb641b; color: white; border: none; width: 100%; padding: 15px; font-size: 16px; font-weight: bold; border-radius: 2px; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="header">
        <span class="back-btn" onclick="history.back()">&larr;</span>
        <span class="header-title">Add delivery address</span>
    </div>

    <div class="steps-bar">
        <div class="step active">
            <div class="step-circle">1</div>
            <div class="step-label">Address</div>
        </div>
        <div class="step">
            <div class="step-circle">2</div>
            <div class="step-label">Order Summary</div>
        </div>
        <div class="step">
            <div class="step-circle">3</div>
            <div class="step-label">Payment</div>
        </div>
    </div>

    <div class="form-container">
        <input type="text" id="name" class="input-box" placeholder="Full Name (Required)*">
        <input type="number" id="phone" class="input-box" placeholder="Mobile number (Required)*">
        <input type="number" id="pin" class="input-box" placeholder="Pincode (Required)*">
        
        <div class="row">
            <input type="text" id="city" class="input-box" placeholder="City (Required)*">
            <div class="state-wrapper">
                <span class="state-label">State (Required)*</span>
                <select id="state" class="state-select">
                    <option value="Andaman and Nicobar Islands">Andaman and Nicobar Islands</option>
                    <option value="Andhra Pradesh" selected>Andhra Pradesh</option>
                    <option value="Arunachal Pradesh">Arunachal Pradesh</option>
                    <option value="Assam">Assam</option>
                    <option value="Bihar">Bihar</option>
                    <option value="Chandigarh">Chandigarh</option>
                    <option value="Chhattisgarh">Chhattisgarh</option>
                    <option value="Dadra and Nagar Haveli">Dadra and Nagar Haveli</option>
                    <option value="Daman and Diu">Daman and Diu</option>
                    <option value="Delhi">Delhi</option>
                    <option value="Goa">Goa</option>
                    <option value="Gujarat">Gujarat</option>
                    <option value="Haryana">Haryana</option>
                    <option value="Himachal Pradesh">Himachal Pradesh</option>
                    <option value="Jammu and Kashmir">Jammu and Kashmir</option>
                    <option value="Jharkhand">Jharkhand</option>
                    <option value="Karnataka">Karnataka</option>
                    <option value="Kerala">Kerala</option>
                    <option value="Ladakh">Ladakh</option>
                    <option value="Lakshadweep">Lakshadweep</option>
                    <option value="Madhya Pradesh">Madhya Pradesh</option>
                    <option value="Maharashtra">Maharashtra</option>
                    <option value="Manipur">Manipur</option>
                    <option value="Meghalaya">Meghalaya</option>
                    <option value="Mizoram">Mizoram</option>
                    <option value="Nagaland">Nagaland</option>
                    <option value="Odisha">Odisha</option>
                    <option value="Puducherry">Puducherry</option>
                    <option value="Punjab">Punjab</option>
                    <option value="Rajasthan">Rajasthan</option>
                    <option value="Sikkim">Sikkim</option>
                    <option value="Tamil Nadu">Tamil Nadu</option>
                    <option value="Telangana">Telangana</option>
                    <option value="Tripura">Tripura</option>
                    <option value="Uttar Pradesh">Uttar Pradesh</option>
                    <option value="Uttarakhand">Uttarakhand</option>
                    <option value="West Bengal">West Bengal</option>
                </select>
            </div>
        </div>

        <input type="text" id="house" class="input-box" placeholder="House No., Building Name (Required)*">
        <input type="text" id="area" class="input-box" placeholder="Road name, Area, Colony (Required)*">
    </div>

    <div class="footer">
        <button class="save-btn" onclick="saveAndNext()">Save Address</button>
    </div>

    <script>
        function saveAndNext() {
            const name = document.getElementById('name').value;
            const phone = document.getElementById('phone').value;
            const addr = document.getElementById('house').value;

            if(name && phone.length === 10 && addr) {
                // Yahan address ko URL parameters ke sath summary page par bhejenge
                const currentUrlParams = window.location.search;
                window.location.href = `order-summary.html${currentUrlParams}&custName=${name}&custPhone=${phone}`;
            } else {
                alert("Please fill all required fields correctly.");
            }
        }
    </script>
</body>
</html>
